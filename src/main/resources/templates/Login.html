<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>

<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    
    <div class="players-card p-4" style="width: 400px; max-width: 100%;">
        
        <h3 class="text-center mb-4">Login</h3>

        <form th:action="@{/login}" method="post">

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="text" name="username" class="form-control" placeholder="Enter email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>

            <!-- Error Message -->
            <div th:if="${param.error}" class="alert alert-danger text-center">
                Invalid username or password
            </div>

            <!-- Logout Message -->
            <div th:if="${param.logout}" class="alert alert-success text-center">
                You have been logged out
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-dark">Login</button>
            </div>

        </form>

    </div>

</div>

<div th:insert="fragments/base :: assetsScripts"></div>

</body>
</html>
