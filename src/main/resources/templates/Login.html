<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container" style="display: flex; flex-direction: column; align-items: center; padding-top: 50px;">
    <div class="app-header">
        <h2 class="mb-4">Login</h2>
    </div>
    <div class="login-card">
        <form th:action="@{/login}" method="POST">

            <div class="mb-3" style="width: 300px; margin: 0 auto;">
                <label for="username" class="form-label">Email / Username</label>
                <input type="text" class="form-control" id="username" name="username" style="width: 300px; margin: 0 auto;" required>            </div>

            <div class="mb-3" style="width: 300px; margin: 0 auto;">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" style="width: 300px; margin: 0 auto;" required>            </div>

            <button type="submit" class="btn btn-primary btn-lg" style="width: 300px; margin: 0 auto; display: block;">Login</button>
        </form>

        <div class="mt-3" style="width: 300px; margin: 0 auto; text-align: center;">
            <p>If you don't have an account why not make one?</p>
            <p>Click the link to <a th:href="@{/register}">Register</a></p>
        </div>
    </div>
</div>

<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
