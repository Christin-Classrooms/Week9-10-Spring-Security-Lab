<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Fighter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">
    <div class="card bg-secondary shadow-lg">
        <div class="card-body">

            <h3 class="mb-4">Create Fighter</h3>

            <form th:action="@{/create-fighter}" th:object="${fighter}" method="post">

                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" th:field="*{name}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Health</label>
                    <input type="number" class="form-control" th:field="*{health}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Damage</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{damage}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Resistance</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{resistance}">
                </div>

                <button class="btn btn-success w-100">Create Fighter</button>

            </form>

        </div>
    </div>
</div>

</body>
</html>
