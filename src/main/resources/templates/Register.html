<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register Page</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container" style="display: flex; flex-direction: column; align-items: center; padding-top: 50px;">
    <div class="app-header">
        <h2 class="mb-4">Register New Account</h2>
    </div>

    <div class="register-card">
        <form th:action="@{/register}" th:object="${player}" method="POST" novalidate>

            <div class="mb-3" style="width: 300px; margin: 0 auto;">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" th:field="*{name}" style="width: 300px; margin: 0 auto;" required>
            </div>

            <div class="mb-3" style="width: 300px; margin: 0 auto;">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" th:field="*{email}" style="width: 300px; margin: 0 auto;" required>
            </div>

            <div class="mb-3" style="width: 300px; margin: 0 auto;">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" th:field="*{username}" style="width: 300px; margin: 0 auto;" required>
            </div>

            <div class="mb-3" style="width: 300px; margin: 0 auto;">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" th:field="*{password}" style="width: 300px; margin: 0 auto;" required>
            </div>

            <button type="submit" class="btn btn-primary btn-lg" style="width: 300px; margin: 0 auto; display: block;">Register</button>
        </form>
        <div style="text-align: center;">
            <div class="mt-3">
                <p>Click here if you already have an account with us <a th:href="@{/login}">Login here</a></p>
            </div>
        </div>
    </div>
</div>

<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
