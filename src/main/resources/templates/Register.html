<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<div th:insert="fragments/base :: assetsHead"></div>

<body>
    <nav th:replace="fragments/navbar :: navbar"></nav>

    <div class="app-container">
        <div class="app-header">
            <h2 class="mb-4">Create an Account</h2>
        </div>

        <div class="players-card">
            <form th:action="@{/register}" th:object="${player}" method="POST" novalidate>

                <div class="mb-3">
                    <label for="name" class="form-label">Username</label>
                    <input type="text" class="form-control" id="name" th:field="*{name}"
                        th:classappend="${#fields.hasErrors('name') ? 'is-invalid' : ''}" required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
                        Name Error.
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" th:field="*{email}"
                        th:classappend="${#fields.hasErrors('email') ? 'is-invalid' : ''}" required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                        Email Error.
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" th:field="*{password}" required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg">Register</button>
            </form>

            <p class="mt-3">Already have an account? <a th:href="@{/login}">Login here</a></p>
        </div>
    </div>

    <div th:insert="fragments/base :: assetsScripts"></div>
</body>

</html>
