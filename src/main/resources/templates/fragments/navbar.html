<nav
  th:fragment="navbar"
  class="navbar navbar-expand-lg navbar-dark bg-dark"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <div class="container-fluid">
    <a class="navbar-brand" th:href="@{/}">TekkenReborn</a>
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarSupportedContent"
      aria-controls="navbarSupportedContent"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" aria-current="page" th:href="@{/}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/players}">Players</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/fighters}">Fighters</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" th:href="@{/create-fighter}">Create Fighter</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" th:href="@{/h2-console}">H2 Console</a>
        </li>
      </ul>
      <form class="d-flex" role="search" method="get" th:action="@{/players}">
        <input
          name="id"
          class="form-control me-2"
          type="search"
          placeholder="Player ID"
          aria-label="Search"
        />
        <button class="btn btn-outline-light" type="submit">Search</button>
      </form>
      <form
        method="post"
        sec:authorize="isAuthenticated()"
        th:action="@{/logout}"
      >
        <button class="btn btn-outline-danger mt-3" type="submit">
          Logout
        </button>
      </form>
    </div>
  </div>
</nav>
