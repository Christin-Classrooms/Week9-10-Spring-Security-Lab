<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">TekkenReborn</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <!-- home/ this is visible to authenticated users -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" aria-current="page" th:href="@{/}">Home</a>
                </li>
                
                <!-- Players/ this is visible to authenticated users -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/players}">Players</a>
                </li>
                
                <!-- Register (which was create player)/ this is visible only to non-authenticated users -->
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/register}">Register</a>
                </li>
                
                <!-- Fighters/ this isvisible to authenticated users -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/fighters}">Fighters</a>
                </li>
                
                <!-- Create Fighter/ this is visible only to the admin -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/create-fighter}">Create Fighter</a>
                </li>
                
                <!-- H2 Console/ this is visible only to the admin -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/h2-console}">H2 Console</a>
                </li>
            </ul>
            
            <!-- Authentication Section/ this shows user info and the logout button -->
            <div sec:authorize="isAuthenticated()" class="d-flex align-items-center">
                <span class="text-light me-3">
                    Welcome, <span sec:authentication="name"></span>
                    (<span th:text="${#authentication.getAuthorities()[0].getAuthority().replace('ROLE_', '')}"></span>)
                </span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
            
            <div sec:authorize="!isAuthenticated()" class="d-flex">
                <a th:href="@{/login}" class="btn btn-outline-light btn-sm">Login</a>
            </div>
            
            <!-- potentially removing search due to authentication requirements -->
            <form sec:authorize="isAuthenticated()" class="d-flex" role="search" method="get" th:action="@{/players}">
                <input name="id" class="form-control me-2" type="search" placeholder="Player ID" aria-label="Search"/>
                <button class="btn btn-outline-light" type="submit">Search</button>
            </form>
        </div>
    </div>
</nav>
</html>
