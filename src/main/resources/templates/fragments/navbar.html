<nav th:fragment="navbar"
     class="navbar navbar-expand-lg navbar-dark bg-dark"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <div class="container-fluid">

        <!-- BRAND -->
        <a class="navbar-brand" th:href="@{/}">TekkenReborn</a>

        <!-- TOGGLER -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- NAV CONTENT -->
        <div class="collapse navbar-collapse" id="navbarSupportedContent">

            <!-- LEFT SIDE -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Home</a>
                </li>

                <!-- Logged-in users -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/players}">Players</a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/fighters}">Fighters</a>
                </li>

                <!-- 👤 REGISTER (only if NOT logged in) -->
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" th:href="@{/register}">Register</a>
                </li>

                <!-- 🔐 ADMIN ONLY -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/create-fighter}">Create Fighter</a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/h2-console}">H2 Console</a>
                </li>

            </ul>

            <!-- RIGHT SIDE -->
            <div class="d-flex align-items-center gap-2">

                <!-- SEARCH (only when logged in) -->
                <form class="d-flex"
                      role="search"
                      method="get"
                      th:action="@{/players}"
                      sec:authorize="isAuthenticated()">

                    <input name="search"
                           class="form-control me-2"
                           type="search"
                           placeholder="Search players">

                    <button class="btn btn-outline-light" type="submit">
                        Search
                    </button>
                </form>

                <!-- 🔓 LOGIN (only if NOT logged in) -->
                <a class="btn btn-outline-light"
                   th:href="@{/login}"
                   sec:authorize="isAnonymous()">
                    Login
                </a>

                <!-- 🔒 LOGOUT (only if logged in) -->
                <a class="btn btn-danger"
                   th:href="@{/logout}"
                   sec:authorize="isAuthenticated()">
                    Logout
                </a>

            </div>

        </div>
    </div>
</nav>
