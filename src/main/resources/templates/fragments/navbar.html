<!--
    Part 8: xmlns:sec namespace added for sec:authorize role-based visibility.
    NOTE: sec:authorize only HIDES elements. SecurityFilterChain in SecurityConfig.java
    is what actually BLOCKS unauthorized access on the server side. You need both.
-->
<nav th:fragment="navbar"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
     class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">TekkenReborn</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <!-- Visible to all authenticated users -->
                <li class="nav-item">
                    <a class="nav-link" aria-current="page" th:href="@{/}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/players}">Players</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/fighters}">Fighters</a>
                </li>

                <!-- Part 8: ADMIN-only links — hidden from PLAYER role -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/create-fighter}">Create Fighter</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/h2-console}">H2 Console</a>
                </li>

            </ul>

            <!-- Search bar -->
            <form class="d-flex me-2" role="search" method="get" th:action="@{/players}">
                <input name="id" class="form-control me-2" type="search" placeholder="Player ID" aria-label="Search"/>
                <button class="btn btn-outline-light" type="submit">Search</button>
            </form>

            <!-- Part 8: Logout button — visible to all authenticated users -->
            <div sec:authorize="isAuthenticated()">
                <form method="post" th:action="@{/logout}" class="d-inline">
                    <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
                </form>
            </div>

        </div>
    </div>
</nav>
