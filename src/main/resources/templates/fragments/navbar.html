<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">TekkenReborn</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" aria-current="page" th:href="@{/}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/players}">Players</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/fighters}">Fighters</a>
                </li>

                <!-- ADMIN ONLY links -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/create-fighter}">Create Fighter</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/h2-console}">H2 Console</a>
                </li>
            </ul>

            <!-- Logout button - visible to all logged in users -->
            <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-2">
                <span class="text-light" sec:authentication="name"></span>
                <form method="post" th:action="@{/logout}" class="d-inline">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>

        </div>
    </div>
</nav>
