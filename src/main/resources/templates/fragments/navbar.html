<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <body>
    <nav
      th:fragment="navbar"
      class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm"
    >
      <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">FIGHTER APP</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item" sec:authorize="isAuthenticated()">
              <a class="nav-link" th:href="@{/fighters}">Fighters</a>
            </li>
            <li class="nav-item" sec:authorize="isAuthenticated()">
              <a class="nav-link" th:href="@{/players}">Players</a>
            </li>
            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
              <a class="nav-link text-warning" th:href="@{/create-fighter}"
                >+ Add Fighter</a
              >
            </li>
            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
              <a class="nav-link text-info" th:href="@{/h2-console}"
                >H2 Console</a
              >
            </li>
          </ul>
          <div class="d-flex align-items-center">
            <span
              sec:authorize="isAuthenticated()"
              class="navbar-text me-3 text-light"
            >
              Logged in as:
              <strong th:text="${#authentication.name}">Admin</strong>
            </span>
            <form
              sec:authorize="isAuthenticated()"
              th:action="@{/logout}"
              method="post"
              class="m-0"
            >
              <button class="btn btn-outline-danger btn-sm" type="submit">
                Logout
              </button>
            </form>
            <a
              sec:authorize="isAnonymous()"
              th:href="@{/login}"
              class="btn btn-primary btn-sm"
              >Login</a
            >
          </div>
        </div>
      </div>
    </nav>
  </body>
</html>
