<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="base :: assetsHead"></head>
<body>

<div th:replace="navbar :: navbar"></div>

<div class="container mt-5">
    <h2>Register</h2>

    <form th:action="@{/register}" th:object="${player}" method="post" class="mt-3">

        <div class="mb-3">
            <label class="form-label">Name</label>
            <input th:field="*{name}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input th:field="*{email}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input th:field="*{password}" type="password" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary">Register</button>
    </form>
</div>

<div th:replace="base :: assetsScripts"></div>
</body>
</html>
