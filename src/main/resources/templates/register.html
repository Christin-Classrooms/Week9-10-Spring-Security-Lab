<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body class="container">
    <h2>Register</h2>
    <form th:action="@{/register}" th:object="${player}" method="post">
      <input type="text" th:field="*{name}" placeholder="Full Name" required />
      <input type="text" th:field="*{email}" placeholder="Email" required />
      <input
        type="password"
        th:field="*{password}"
        placeholder="Password"
        required
      />
      <button type="submit">Register</button>
    </form>
  </body>
</html>
