<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow">
                <div class="card-body">

                    <h3 class="text-center mb-4">Register</h3>

                    <form th:action="@{/register}" th:object="${player}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" th:field="*{name}" class="form-control">
                            <small class="text-danger" th:errors="*{name}"></small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control">
                            <small class="text-danger" th:errors="*{email}"></small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" th:field="*{password}" class="form-control">
                            <small class="text-danger" th:errors="*{password}"></small>
                        </div>

                        <button type="submit" class="btn btn-dark w-100">Register</button>
                    </form>

                    <div class="text-center mt-3">
                        <a th:href="@{/login}">Already have an account?</a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
