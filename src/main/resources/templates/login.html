<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
</head>
<body style="font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 40px;">

<div style="
    max-width: 350px;
    margin: 60px auto;
    background: white;
    padding: 25px 30px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
">

    <h2 style="text-align: center; margin-bottom: 25px;">Login</h2>

    <form th:action="@{/login}" method="post">

        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px;">Email:</label>
            <input type="email" name="username" required
                   style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" />
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px;">Password:</label>
            <input type="password" name="password" required
                   style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" />
        </div>

        <div>
            <button type="submit"
                    style="
                        width: 100%;
                        padding: 10px;
                        background: #007bff;
                        color: white;
                        border: none;
                        border-radius: 4px;
                        cursor: pointer;
                    ">
                Login
            </button>
        </div>

        <p> Don't have an account? <a th:href="@{/register}">Register here</a> </p>

        <p style="color: red"> Admin:</p>
        <p style="color: red"> Email: admin@humber.ca</p>
        <p style="color: red"> Password: admin123</p>

    </form>

</div>

</body>
</html>
