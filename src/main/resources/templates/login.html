<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login – TekkenReborn</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">

<div class="container mt-5" style="max-width: 420px;">
    <div class="card bg-secondary text-light">
        <div class="card-header text-center">
            <h4>🎮 TekkenReborn – Login</h4>
        </div>
        <div class="card-body">

            <!-- Part 5: Error / logout messages from Spring Security query params -->
            <div th:if="${param.error}" class="alert alert-danger">
                Invalid username or password.
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                You have been logged out.
            </div>

            <!--
                Part 5: POST to /login — Spring Security handles this automatically.
                Field names MUST be exactly "username" and "password".
            -->
            <form method="post" th:action="@{/login}">
                <!-- CSRF token is injected automatically by Thymeleaf + Spring Security -->

                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username"
                           class="form-control" placeholder="Enter your username" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password"
                           class="form-control" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-warning w-100">Login</button>
            </form>

            <hr>
            <p class="text-center mb-0">
                Don't have an account?
                <a th:href="@{/register}" class="link-warning">Register here</a>
            </p>
        </div>
    </div>
</div>

</body>
</html>
