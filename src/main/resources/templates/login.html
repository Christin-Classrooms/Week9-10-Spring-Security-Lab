<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<div th:insert="fragments/base :: assetsHead"></div>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container">
    <div class="app-header">
        <h2 class="mb-4">Login</h2>
    </div>

    <div class="players-card">
        <!-- Display logout message if present -->
        <div th:if="${param.logout}" class="alert alert-info" role="alert">
            You have been logged out successfully.
        </div>

        <!-- Display error message if login failed -->
        <div th:if="${param.error}" class="alert alert-danger" role="alert">
            Invalid username or password.
        </div>

        <form method="POST" th:action="@{/login}" novalidate>
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input
                    type="text"
                    class="form-control"
                    id="username"
                    name="username"
                    placeholder="Enter your username"
                    required/>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required/>
            </div>

            <button type="submit" class="btn btn-primary">Login</button>
            <p class="mt-3">Don't have an account? <a th:href="@{/register}">Register here</a></p>
        </form>
    </div>
</div>

</body>
</html>
