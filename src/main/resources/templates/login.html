<!doctype html>
<!-- LOGIN PAGE SPRING HANDLES THE POST -->
<html
	lang="en"
	xmlns:th="http://www.thymeleaf.org"
>
	<div th:insert="fragments/base :: assetsHead"></div>
	<body>
		<div class="app-container">
			<div class="app-header">
				<h2 class="mb-4">Login</h2>
			</div>

			<div class="players-card">
				<!-- ERROR MSG IF BAD CREDNTIALS -->
				<div
					th:if="${param.error}"
					class="alert alert-danger"
				>
					Invalid username or password.
				</div>

				<!-- LOGOUT CONFIRMATON MSG -->
				<div
					th:if="${param.logout}"
					class="alert alert-success"
				>
					You have been logged out.
				</div>

				<!-- SPRING SECURITY HANDLES POST /login AUTOMATICLY -->
				<form
					th:action="@{/login}"
					method="POST"
				>
					<div class="mb-3">
						<label
							for="username"
							class="form-label"
							>Username</label
						>
						<input
							type="text"
							class="form-control"
							id="username"
							name="username"
							required
						/>
					</div>

					<div class="mb-3">
						<label
							for="password"
							class="form-label"
							>Password</label
						>
						<input
							type="password"
							class="form-control"
							id="password"
							name="password"
							required
						/>
					</div>

					<button
						type="submit"
						class="btn btn-primary btn-lg"
					>
						Login
					</button>
					<a
						th:href="@{/register}"
						class="btn btn-secondary btn-lg ms-2"
						>Register</a
					>
				</form>
			</div>
		</div>

		<div th:insert="fragments/base :: assetsScripts"></div>
	</body>
</html>
