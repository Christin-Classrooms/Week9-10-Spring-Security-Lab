<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <!-- Insert your head assets (CSS, etc.) -->
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>

    <!-- Navigation bar -->
    <nav th:replace="fragments/navbar :: main-nav"></nav>

    <!-- Main content -->
    <div class="container-center">
        <div class="card-player">
            <h2 th:text="${message}">Welcome!</h2>
            <p class="subtitle-text">Navigate using the menu above.</p>
        </div>
    </div>

    <!-- Scripts -->
    <div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
