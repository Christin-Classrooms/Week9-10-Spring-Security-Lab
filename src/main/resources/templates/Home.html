<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/base :: header}"></head>
  <body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container py-5">
      <div class="p-5 mb-4 bg-white rounded-3 shadow-sm border text-center">
        <div class="container-fluid py-5">
          <h1 class="display-5 fw-bold text-dark" th:text="${message}">
            Message Here
          </h1>
          <p class="col-md-8 fs-4 mx-auto text-muted">
            CPAN 228 - Spring Security & Data Management Lab.
          </p>
          <div class="d-grid gap-2 d-sm-flex justify-content-sm-center mt-4">
            <a th:href="@{/fighters}" class="btn btn-primary btn-lg px-4 gap-3"
              >View Fighters</a
            >
            <a th:href="@{/players}" class="btn btn-outline-dark btn-lg px-4"
              >View Players</a
            >
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
